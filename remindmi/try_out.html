<body class="try-page">
    <header class="site_header">
        <nav class="navbar">    
            <img id="brand" src="images/brand_white.png" alt= "main brand logo">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="try_out.html">Try It</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="try_out_section">
            <div class="try_out_content">
                <h2>Try Out RemindMi</h2>
                <div class="input">
                    <input type="text" class="input_field" id="todoInput" placeholder="Add a new task" aria-label="New task input">
                    <button class="btn">Add</button>
                </div>
                <ul class="scroll">
                    <li id="todoList"></li>
                </ul>
                <div>
                    <hr class="counter">
                    <div class="counter_container">
                        <p><span id="todoCount">0</span> items total</p>
                        <button id="deleteButton">Delete All</button>
                    </div>
                </div>
            </div>
        </section>
        
    </main>
    <footer class="site-footer">
            <div class="footer-top">
                <div class="footer-logo">
                    <img id="footer_brand" src="images/brand_white.png" alt="RemindMi logo">
                </div>

                <div class="footer-socials">
                    <a href="#" aria-label="Instagram">Instagram</a>
                    <a href="#" aria-label="Facebook">Facebook</a>
                    <a href="#" aria-label="X">X</a>
                </div>
            </div>

            <div class="footer-bottom">
                <p>&copy; 2026 RemindMi. All rights reserved.</p>
                <div class="footer_links">
                    <a href="privacy.html">Privacy Policy</a>

                </div>
            </div>
        </footer>
</body>
</html>
