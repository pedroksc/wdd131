<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemindMi</title>
    <link href="styles/index.css" rel="stylesheet">
    <script src="styles/index.js" defer></script>
</head>
<body>
    <header class="site_header">
        <nav class="navbar">    
            <img id="brand" src="images/brand_white.png" alt= "main brand logo">
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">Try It</a>
                <a href="#">About</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero_section">
            <div class="hero_content">
                <h1 id="hero_title"></h1>
                <p id="hero_description"></p>
                <a href="#" class="btn_primary">Try Out</a>
            </div>

            <div class="hero_image_container">
                <img id="home_hero" src="images/hero_image.png" alt="person doing important tasks">
            </div>
        </section>

        <section class="features_section">
            <h2 id="features_title">RemindMi Main Features</h2>

            <div class="home_cards">
                <article class="feature_card" id="feature_1">
                    <svg id=feature_brand xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-brain-circuit-icon lucide-brain-circuit"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M12 8h8"/><path d="M16 8V5a2 2 0 0 1 2-2"/><circle cx="16" cy="13" r=".5"/><circle cx="18" cy="3" r=".5"/><circle cx="20" cy="21" r=".5"/><circle cx="20" cy="8" r=".5"/></svg>
                    <h3 class="feature_title"></h3>
                    <p class="feature_description"></p>
                </article>

                <article class="feature_card" id="feature_2">
                    <svg id=goal_brand xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-goal-icon lucide-goal"><path d="M12 13V2l8 4-8 4"/><path d="M20.561 10.222a9 9 0 1 1-12.55-5.29"/><path d="M8.002 9.997a5 5 0 1 0 8.9 2.02"/></svg>
                    <h3 class="feature_title"></h3>
                    <p class="feature_description"></p>
                </article>

                <article class="feature_card" id="feature_3">
                    <svg id=todo_brand xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-check-icon lucide-calendar-check"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg>
                    <h3 class="feature_title"></h3>
                    <p class="feature_description"></p>
                </article>
            </div>
        </section>

        <section class="testimonial_section">
            <div class="testimonial-card">
                <img id="testimonial_avatar" src="images/meredith.jpg" alt="president meredith">
                <blockquote id="testimonial_text"></blockquote>
                <p id="testimonial_name"></p>
                <p id="testimonial_role"></p>
            </div>
        </section>
    </main>
    <footer class="site-footer">
            <div class="footer-top">
                <div class="footer-logo">
                    <img id=footer_brand src="images/brand_white.png" alt="RemindMi logo">
                </div>

                <div class="footer-socials">
                    <a href="#" aria-label="Instagram">Instagram</a>
                    <a href="#" aria-label="Facebook">Facebook</a>
                    <a href="#" aria-label="X">X</a>
                </div>
            </div>

            <div class="footer-bottom">
                <p>&copy; 2026 RemindMi. All rights reserved.</p>
                <div class="footer_links">
                    <a href="privacy.html">Privacy Policy</a>
                    <a href="terms.html">Termso of Service</a>
                </div>
            </div>
        </footer>
</body>
</html>
