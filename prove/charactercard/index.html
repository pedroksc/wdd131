<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Character card with level up and attack features.">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="prove\charactercard\images\image.png">
    <title>Character Card</title>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card">
        <img src="images/image.png" alt="Character Image">
        <div class="card-header">
            <h1>Snortleblat</h1>
        </div>
        <div id="card-body">
            <p>Class: Swamp Beast Diplomat</p>
            <p>Level:<span id="levelValue"> 5</span></p>
            <p>Health:<span id="healthValue"> 100</span></p>
        </div>
        <div class="card-footer">
            <button id="attackButton">Attacked</button>
            <button id="levelUpButton">Level Up</button>
        </div>
    </div>

</body>
</html>
