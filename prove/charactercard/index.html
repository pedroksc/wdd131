<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Pedro">
    <meta name="description" content="Character card with level up and attack features">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Character card with level up and attack features.">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="prove/charactercard/images/image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Character card with level up and attack features.">
    <meta name="twitter:image" content="prove/charactercard/images/image.png">

    <!-- Favicon -->
    <link rel="icon" href="images/sword.png">

    <!-- One Apple Touch Icon (IOS home screen)-->
    <link rel="apple-touch-icon" href="images/sword.png">

    <title>Character Card</title>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card">
        <img>
        <div class="card-header">
            <h1 id="characterName"></h1>
        </div>
        <div id="card-body">
            <p id="characterClass"></p>
            <p>Level: <span id="levelValue"></span></p>
            <p>Health: <span id="healthValue"></span></p>
        </div>
        <div class="card-footer">
            <button id="attackButton">Attacked</button>
            <button id="levelUpButton">Level Up</button>
        </div>
    </div>

</body>
</html>
